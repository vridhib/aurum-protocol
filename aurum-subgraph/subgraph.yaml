specVersion: 1.3.0
indexerHints:
  prune: auto
schema:
  file: ./schema.graphql
dataSources:
  - kind: ethereum
    name: AurumEngine
    network: sepolia
    source:
      address: "0x471C1D6f2c8D9883D051F296429bCadB4eB4DC11"
      abi: AurumEngine
      startBlock: 10570112
    mapping:
      kind: ethereum/events
      apiVersion: 0.0.9
      language: wasm/assemblyscript
      entities:
        - User
        - Protocol
        - Liquidation
      abis:
        - name: AurumEngine
          file: ./abis/AurumEngine.json
      eventHandlers:
        - event: CollateralDeposited(indexed address,indexed uint256)
          handler: handleCollateralDeposited
        - event: CollateralRedeemed(indexed address,indexed address,uint256)
          handler: handleCollateralRedeemed
        - event: MintAUSD(indexed address,uint256)          
          handler: handleMintAUSD
        - event: BurnAUSD(indexed address,uint256)          
          handler: handleBurnAUSD
        - event: Liquidated(indexed address,indexed address,uint256,uint256,uint256)
          handler: handleLiquidated
      file: ./src/aurum-engine.ts
